<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} · RiderLens</title>
  <meta name="robots" content="noindex" />

  <meta property="og:type" content="video.other" />
  <meta property="og:site_name" content="RiderLens" />
  <meta property="og:title" content="{{OG_TITLE}}" />
  <meta property="og:description" content="{{OG_DESCRIPTION}}" />
  <meta property="og:url" content="{{PAGE_URL}}" />
  <meta property="og:image" content="{{POSTER_URL}}" />
  <meta property="og:image:width" content="{{POSTER_WIDTH}}" />
  <meta property="og:image:height" content="{{POSTER_HEIGHT}}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{OG_TITLE}}" />
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}" />
  <meta name="twitter:image" content="{{POSTER_URL}}" />

  <link rel="icon" href="https://riderlens.app/assets/favicon-96x96.png" type="image/png" sizes="96x96" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --page: #f5f7f1; --ink: #101411; --muted: #60685f;
      --accent: #b6ff2e; --accent-deep: #2e7d32; --line: #dde3da;
      --card: #181d18; --card-line: #2a2f2a; --card-ink: #f0f4ec;
      --sans: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --display: "Bebas Neue", var(--sans);
    }
    * { box-sizing: border-box; margin: 0; }
    body { background: linear-gradient(160deg, #eef7dc 0%, var(--page) 45%, #ffffff 100%);
           color: var(--ink); font-family: var(--sans); min-height: 100vh; }
    .top { display: flex; flex-direction: column; align-items: center; padding: 26px 16px 34px; }
    .brand img { height: 56px; display: block; }
    h1 { font-family: var(--display); font-weight: 400; letter-spacing: 1px;
         font-size: clamp(42px, 9vw, 76px); line-height: 0.95; text-align: center;
         text-transform: uppercase; margin: 22px 0 26px; }
    .player { width: min(960px, 100%); background: var(--card); border: 1px solid var(--card-line);
              border-radius: 18px; overflow: hidden; box-shadow: 0 30px 60px -30px rgba(16, 20, 17, 0.4); }
    video { width: 100%; display: block; background: #000; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; padding: 14px 14px 4px; font-family: var(--mono); font-size: 13px; }
    .chip { background: #232c22; border: 1px solid var(--card-line); color: var(--card-ink);
            border-radius: 999px; padding: 6px 14px; }
    .chip b { color: var(--accent); }
    .controls { display: flex; gap: 8px; padding: 12px 14px 14px; }
    .controls button { flex: 1; background: #232c22; color: var(--card-ink); border: 1px solid var(--card-line);
                       border-radius: 10px; padding: 11px 0; font-family: var(--mono); font-size: 13px; cursor: pointer; }
    .controls button.primary { background: var(--accent); color: #101411; border: 0; font-weight: 700; }

    .band { background: #B7FF2D; padding: 44px 20px;
            display: flex; justify-content: center; }
    .band-inner { width: min(960px, 100%); display: flex; align-items: center; gap: 30px; flex-wrap: wrap; justify-content: center; }
    .band-copy { flex: 1 1 300px; min-width: 280px; }
    .band-copy h2 { font-family: var(--display); font-weight: 400; font-size: clamp(40px, 7vw, 64px);
                    letter-spacing: 1px; line-height: 0.95; }
    .band-copy p { font-size: clamp(20px, 3.4vw, 28px); margin: 8px 0 22px; }
    .stores { display: flex; gap: 12px; flex-wrap: wrap; }
    .stores img { height: 66px; display: block; }
    .band-art { flex: 0 1 380px; min-width: 260px; }
    .band-art img { width: 100%; display: block; }

    footer { background: var(--card); color: #8d978b; font-size: 13px; text-align: center;
             line-height: 1.8; padding: 18px 16px; }
    footer a { color: #8d978b; }
  </style>
</head>
<body>
  <div class="top">
    <a class="brand" href="https://riderlens.app?utm_source=share_page&utm_medium=header">
      <img src="https://riderlens.app/assets/logo.png" alt="RiderLens — see your riding, frame by frame" />
    </a>

    <h1>{{HEADLINE}}</h1>

    <div class="player">
      <video id="clip" src="{{CLIP_URL}}" poster="{{POSTER_URL}}" controls playsinline loop preload="metadata"></video>
      <div class="meta">{{CHIPS}}</div>
      <div class="controls">
        <button onclick="step(-1)">− frame</button>
        <button class="primary" onclick="toggle()" id="playBtn">Play</button>
        <button onclick="step(1)">+ frame</button>
        <button onclick="slow()" id="slowBtn">¼ speed</button>
      </div>
    </div>
  </div>

  <div class="band">
    <div class="band-inner">
      <div class="band-copy">
        <h2>Download now</h2>
        <p>See your riding,<br />frame by frame.</p>
        <div class="stores">
          <a href="https://apps.apple.com/app/id6790874129" target="_blank" rel="noopener noreferrer" aria-label="Download on the App Store"><img src="https://riderlens.app/assets/apple-store.svg" alt="Download on the App Store" /></a>
          <a href="https://play.google.com/store/apps/details?id=com.riderlens.app" target="_blank" rel="noopener noreferrer" aria-label="Get it on Google Play"><img src="https://riderlens.app/assets/google-play.svg" alt="Get it on Google Play" /></a>
        </div>
      </div>
      <div class="band-art">
        <img src="https://riderlens.app/assets/concept_image.png" alt="Phone showing a RiderLens record with motion echoes" loading="lazy" />
      </div>
    </div>
  </div>

  <footer>
    Shared with RiderLens — analysis drawn on every frame.<br />
    Your clip? <a href="mailto:hello@riderlens.app?subject=Remove%20shared%20clip%20{{SHARE_ID}}">Ask us to remove it</a> ·
    <a href="https://riderlens.app/privacy">Privacy</a>
  </footer>

  <script>
    var video = document.getElementById("clip");
    var FRAME = 1 / 30;
    function toggle() {
      if (video.paused) { video.play(); } else { video.pause(); }
    }
    video.addEventListener("play", function () { document.getElementById("playBtn").textContent = "Pause"; });
    video.addEventListener("pause", function () { document.getElementById("playBtn").textContent = "Play"; });
    function step(direction) {
      video.pause();
      video.currentTime = Math.max(0, video.currentTime + direction * FRAME);
    }
    function slow() {
      var slowed = video.playbackRate !== 1;
      video.playbackRate = slowed ? 1 : 0.25;
      document.getElementById("slowBtn").textContent = slowed ? "¼ speed" : "1× speed";
    }
  </script>
</body>
</html>
