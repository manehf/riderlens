# fly.toml app configuration file generated for riderlens-worker on 2026-07-07T12:02:30+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'riderlens-worker'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  RIDERLENS_DEV_UI = '0'
  SENTRY_DSN = 'https://9b62e80d08875c74cf3dcbff87660da8@o4511693741948928.ingest.us.sentry.io/4511733886943232'

[http_service]
  internal_port = 8080
  force_https = true
  # Suspend (freeze in memory) instead of full stop: resume is ~1s instead of
  # the ~20s cold boot - share-page visitors and first analyses both feel it.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    # Relaxed: pose processing saturates the CPU and a tight probe
    # false-fails mid-record. The request itself still completes.
    interval = '60s'
    timeout = '15s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-8x'
  memory = '4096mb'
