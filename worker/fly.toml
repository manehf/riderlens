# fly.toml app configuration file generated for riderlens-worker on 2026-07-07T12:02:30+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'riderlens-worker'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  RIDERLENS_DEV_UI = '0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    # Relaxed: pose processing saturates the CPU and a tight probe
    # false-fails mid-record. The request itself still completes.
    interval = '60s'
    timeout = '15s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2048mb'
